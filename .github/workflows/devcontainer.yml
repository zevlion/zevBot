name: Dev Container CI

on:
  push:
    branches:
      - main
      - master

jobs:
  validate-and-build:
    name: Validate & Build Dev Container
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate devcontainer.json
        run: |
          echo "Validating devcontainer.json..."

          if [ ! -f ".devcontainer/devcontainer.json" ]; then
            echo "❌ .devcontainer/devcontainer.json not found"
            exit 1
          fi

          python3 << 'EOF'
          import json, sys

          with open('.devcontainer/devcontainer.json', 'r') as f:
              content = f.read()

          try:
              config = json.loads(content)
              print('✅ devcontainer.json is valid JSON')
          except json.JSONDecodeError as e:
              print(f'❌ Invalid JSON: {e}')
              sys.exit(1)

          if not any(k in config for k in ('image', 'build', 'dockerComposeFile')):
              print('❌ devcontainer.json must define one of: image, build, or dockerComposeFile')
              sys.exit(1)

          print('✅ devcontainer.json has a valid container source')
          EOF

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install devcontainer CLI
        run: npm install -g @devcontainers/cli

      - name: Build Dev Container
        run: |
          devcontainer build \
            --workspace-folder . \
            --log-level info
