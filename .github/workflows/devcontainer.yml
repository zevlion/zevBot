name: Dev Container CI

on:
  push:
    branches:
      - main
      - master

jobs:
  validate-and-build:
    name: Validate & Build Dev Container
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate devcontainer.json
        run: |
          echo "Validating devcontainer.json..."

          # Check the file exists
          if [ ! -f ".devcontainer/devcontainer.json" ]; then
            echo "❌ .devcontainer/devcontainer.json not found"
            exit 1
          fi

          # Check it's valid JSON (strips comments first using Node.js)
          node -e "
            const fs = require('fs');
            const content = fs.readFileSync('.devcontainer/devcontainer.json', 'utf8');
            // Strip single-line and block comments (JSON with comments is valid in devcontainer spec)
            const stripped = content
              .replace(/\/\/[^\n]*/g, '')
              .replace(/\/\*[\s\S]*?\*\//g, '');
            try {
              JSON.parse(stripped);
              console.log('✅ devcontainer.json is valid JSON');
            } catch (e) {
              console.error('❌ Invalid JSON:', e.message);
              process.exit(1);
            }
          "

          # Check required fields
          node -e "
            const fs = require('fs');
            const content = fs.readFileSync('.devcontainer/devcontainer.json', 'utf8');
            const stripped = content
              .replace(/\/\/[^\n]*/g, '')
              .replace(/\/\*[\s\S]*?\*\//g, '');
            const config = JSON.parse(stripped);

            const hasImage = !!config.image;
            const hasBuild = !!config.build;
            const hasDockerCompose = !!config.dockerComposeFile;

            if (!hasImage && !hasBuild && !hasDockerCompose) {
              console.error('❌ devcontainer.json must define one of: image, build, or dockerComposeFile');
              process.exit(1);
            }
            console.log('✅ devcontainer.json has a valid container source');
          "

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install devcontainer CLI
        run: npm install -g @devcontainers/cli

      - name: Build Dev Container
        run: |
          devcontainer build \
            --workspace-folder . \
            --log-level info
